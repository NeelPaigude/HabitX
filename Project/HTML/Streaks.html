<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Streaks Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="../CSS/StreaksStyle.css">
</head>
<body>

    <div id="Header-div">
        <img src="../Images/streaks-icon.png" alt=""><h1>CURRENT STREAK <span>2 DAYS</span> </h1>
    </div>

    <div  id="weekly-streak">
        <div id="heading-div">
            <h1>STREAK THIS WEEK </h1><img src="../Images/calendar-icon.png" alt="">
        </div>
        <div id="calendar-div">
            <div class="date-div completed">
                <h3>Monday</h3> <img src="../Images/tick-mark-icon.png" alt=""> 
            </div>
            <div class="date-div completed">
                <h3>Tuesday</h3> <img src="../Images/tick-mark-icon.png" alt=""> 
            </div>
            <div class="date-div" id="missed">
                <h3>Wednesday</h3> <img src="../Images/cross-icon.png" alt=""> 
            </div>
            <div class="date-div completed">
                <h3>Thursday</h3> <img src="../Images/tick-mark-icon.png" alt=""> 
            </div>
            <div class="date-div completed">
                <h3>Friday</h3> <img src="../Images/tick-mark-icon.png" alt=""> 
            </div>
            <div class="date-div not-arrived">
                <h3>Saturday</h3> <img src="../Images/Missing-icon.png" alt=""> 
            </div>
            <div class="date-div not-arrived">
                <h3>Sunday</h3> <img src="../Images/Missing-icon.png" alt=""> 
            </div>
        </div>
    </div>

    <div id="streak-info-div">
        <div class="streak-info">
           <img src="../Images/long-streak-icon.png" alt=""><h2>Longest Streak <span>45 DAYS</span></h2>
        </div>
        <div class="streak-info">
            <img src="../Images/previos-streak-icon.png" alt=""><h2>Previous Streak <span>20 DAYS</span></h2>
        </div>
        <div class="streak-info">
             <img src="../Images/consistency-icon.png" alt=""><h2>Consistency<span> 75%</span></h2>
        </div>
    </div>

    <div id="Back-div">
        <a href="./Home.html">Back <img src="../Images/return-icon.png" alt=""></a>
    </div>

</body>
</html>
