<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievement Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="../CSS/AchievementStyle.css">

</head>
<body>

    <div id="header-div">
        <div id="header">
            <h1>Achievements</h1><img src="../Images/achievement-icon.png"  alt="">
        </div>
        <h2>Track Your Milestones</h2>
    </div>

    <div class="achievement-unlocked">
        <h2>Achievements Unlocked: 4/6 </h2>
    </div>

    <div class="container">

        <div class="row achievement-div">

            <div class="col-md-4 achievement-cards completed"> 
                <img src="../Images/Momentum-icon.png" alt="">
                <h2>MOMENTUM</h2>
                <h3>Maintain 3-day streak</h3>
                <img src="../Images/completed-icon.png" alt="" id="completed-incomplete">
            </div>

            <div class="col-md-4 achievement-cards completed"> 
               <img src="../Images/First-Habit-icon.png" alt="">
               <h2>FIRST HABIT</h2>
               <h3>Complete first habit</h3>
               <img src="../Images/completed-icon.png" alt="" id="completed-incomplete">
            </div>

            <div class="col-md-4 achievement-cards completed"> 
               <img src="../Images/consistent-achievement-icon.png" alt="">
               <h2>Consistent</h2>
               <h3>Complete habits 7 days</h3>
               <img src="../Images/completed-icon.png" alt="" id="completed-incomplete">
            </div>

            <div class="col-md-4 achievement-cards completed"> 
               <img src="../Images/Habit-Master-icon.png" alt="">
               <h2>HABIT MASTER</h2>
               <h3>30-day streak</h3>
               <img src="../Images/completed-icon.png" alt="" id="completed-incomplete">
            </div>

            <div class="col-md-4 achievement-cards incomplete"> 
               <img src="../Images/Discipline-king-icon.png" alt="">
               <h2>DISCIPLINE KING</h2>
               <h3>90% consistency</h3>
               <img src="../Images/incomplete-icon.webp" alt="" id="completed-incomplete">
            </div>

            <div class="col-md-4 achievement-cards incomplete"> 
               <img src="../Images/Unstoppable-icon.svg" alt="">
               <h2>UNSTOPPABLE</h2>
               <h3>100-day streak</h3>
               <img src="../Images/incomplete-icon.webp" alt="" id="completed-incomplete">
            </div>

        </div>

    </div>

    <div id="Back-div">
        <a href="./Home.html">Back <img src="../Images/return-icon.png" alt=""></a>
    </div>

</body>
</html>
