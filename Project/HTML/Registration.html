<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registration Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


    <link rel="stylesheet" href="../CSS/RegistrationStyle.css">

</head>

<body>

    <img id="logo-img" src="../Images/HabitX-logo.jpeg" alt="">

    <h1>Habit<span>X</span></h1>

    <form action="Login.html" method="post" id="Registration-box">

        <label for="">Email: </label> 
        <input class="input-text" type="email" required placeholder="Enter your email">
        <label for="">Password: </label>
        <input class="input-text" type="password" required placeholder="Enter password">
        <label for="">Confirm Password: </label>
        <input class="input-text" type="password" required placeholder="Confirm Password">
        <input id="Register-btn" type="submit" value="Register">
        
    </form>

</body>

</html>
