<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Page</title>

    <link rel="stylesheet" href="../CSS/LoginStyle.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>

    <img id="logo-img" src="../Images/HabitX-logo.jpeg" alt="">

    <h1>Habit<span>X</span></h1>

    <form action="Home.html" method="post" id="login-box">

        <label for="">Email: </label>

        <input class="input-text" type="password" placeholder="Enter password">
        <input id="login-btn" type="submit" value="Login">
        
        <div id="Registerlink-div">
            <p>Not a User?<a href="Registration.html">Register</a></p>
        </div>

    </form>

</body>

</html>
